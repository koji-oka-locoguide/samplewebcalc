<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>電卓</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #f0f0f0;
      font-family: 'Segoe UI', sans-serif;
    }

    .calculator {
      background: #2d2d2d;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      width: 280px;
    }

    .display {
      background: #1a1a1a;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 16px;
      text-align: right;
      min-height: 80px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      overflow: hidden;
    }

    .display .expression {
      color: #888;
      font-size: 14px;
      min-height: 20px;
      word-break: break-all;
    }

    .display .result {
      color: #ffffff;
      font-size: 32px;
      font-weight: 300;
      word-break: break-all;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      padding: 18px 0;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      cursor: pointer;
      transition: background 0.1s, transform 0.1s;
      user-select: none;
    }

    button:active {
      transform: scale(0.94);
    }

    .btn-number {
      background: #4a4a4a;
      color: #ffffff;
    }

    .btn-number:hover {
      background: #5a5a5a;
    }

    .btn-operator {
      background: #ff9f0a;
      color: #ffffff;
    }

    .btn-operator:hover {
      background: #ffb340;
    }

    .btn-special {
      background: #636366;
      color: #ffffff;
    }

    .btn-special:hover {
      background: #7a7a7e;
    }

    .btn-equals {
      background: #ff9f0a;
      color: #ffffff;
    }

    .btn-equals:hover {
      background: #ffb340;
    }

    .btn-zero {
      grid-column: span 2;
      text-align: left;
      padding-left: 24px;
    }
  </style>
</head>
<body>
  <div class="calculator">
    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </div>
    <div class="buttons">
      <button class="btn-special" onclick="clearAll()">AC</button>
      <button class="btn-special" onclick="toggleSign()">+/-</button>
      <button class="btn-special" onclick="percent()">%</button>
      <button class="btn-operator" onclick="setOperator('/')">÷</button>

      <button class="btn-number" onclick="appendNumber('7')">7</button>
      <button class="btn-number" onclick="appendNumber('8')">8</button>
      <button class="btn-number" onclick="appendNumber('9')">9</button>
      <button class="btn-operator" onclick="setOperator('*')">×</button>

      <button class="btn-number" onclick="appendNumber('4')">4</button>
      <button class="btn-number" onclick="appendNumber('5')">5</button>
      <button class="btn-number" onclick="appendNumber('6')">6</button>
      <button class="btn-operator" onclick="setOperator('-')">−</button>

      <button class="btn-number" onclick="appendNumber('1')">1</button>
      <button class="btn-number" onclick="appendNumber('2')">2</button>
      <button class="btn-number" onclick="appendNumber('3')">3</button>
      <button class="btn-operator" onclick="setOperator('+')">+</button>

      <button class="btn-number btn-zero" onclick="appendNumber('0')">0</button>
      <button class="btn-number" onclick="appendDecimal()">.</button>
      <button class="btn-equals" onclick="calculate()">=</button>
    </div>
  </div>

  <script>
    let currentValue = '0';
    let previousValue = '';
    let operator = null;
    let shouldResetDisplay = false;
    let expressionStr = '';

    const resultEl = document.getElementById('result');
    const expressionEl = document.getElementById('expression');

    function updateDisplay() {
      resultEl.textContent = currentValue;
      expressionEl.textContent = expressionStr;
    }

    function appendNumber(num) {
      if (shouldResetDisplay) {
        currentValue = num;
        shouldResetDisplay = false;
      } else {
        currentValue = currentValue === '0' ? num : currentValue + num;
      }
      updateDisplay();
    }

    function appendDecimal() {
      if (shouldResetDisplay) {
        currentValue = '0.';
        shouldResetDisplay = false;
      } else if (!currentValue.includes('.')) {
        currentValue += '.';
      }
      updateDisplay();
    }

    function setOperator(op) {
      if (operator && !shouldResetDisplay) {
        calculate(true);
      }
      previousValue = currentValue;
      operator = op;
      shouldResetDisplay = true;

      const opSymbol = { '+': '+', '-': '−', '*': '×', '/': '÷' }[op];
      expressionStr = previousValue + ' ' + opSymbol;
      updateDisplay();
    }

    function calculate(chain) {
      if (!operator || !previousValue) return;

      const prev = parseFloat(previousValue);
      const curr = parseFloat(currentValue);
      let result;

      switch (operator) {
        case '+': result = prev + curr; break;
        case '-': result = prev - curr; break;
        case '*': result = prev * curr; break;
        case '/':
          if (curr === 0) {
            currentValue = 'エラー';
            operator = null;
            previousValue = '';
            expressionStr = '';
            updateDisplay();
            return;
          }
          result = prev / curr;
          break;
      }

      const opSymbol = { '+': '+', '-': '−', '*': '×', '/': '÷' }[operator];
      if (!chain) {
        expressionStr = previousValue + ' ' + opSymbol + ' ' + currentValue + ' =';
      }

      // Avoid floating point display issues
      currentValue = parseFloat(result.toPrecision(12)).toString();
      operator = null;
      previousValue = '';
      shouldResetDisplay = !chain;
      updateDisplay();
    }

    function clearAll() {
      currentValue = '0';
      previousValue = '';
      operator = null;
      shouldResetDisplay = false;
      expressionStr = '';
      updateDisplay();
    }

    function toggleSign() {
      if (currentValue !== '0' && currentValue !== 'エラー') {
        currentValue = currentValue.startsWith('-')
          ? currentValue.slice(1)
          : '-' + currentValue;
        updateDisplay();
      }
    }

    function percent() {
      if (currentValue !== 'エラー') {
        currentValue = (parseFloat(currentValue) / 100).toString();
        updateDisplay();
      }
    }

    // Keyboard support
    document.addEventListener('keydown', (e) => {
      if (e.key >= '0' && e.key <= '9') appendNumber(e.key);
      else if (e.key === '.') appendDecimal();
      else if (e.key === '+') setOperator('+');
      else if (e.key === '-') setOperator('-');
      else if (e.key === '*') setOperator('*');
      else if (e.key === '/') { e.preventDefault(); setOperator('/'); }
      else if (e.key === 'Enter' || e.key === '=') calculate();
      else if (e.key === 'Escape') clearAll();
      else if (e.key === 'Backspace') {
        if (currentValue.length > 1 && currentValue !== 'エラー') {
          currentValue = currentValue.slice(0, -1);
        } else {
          currentValue = '0';
        }
        updateDisplay();
      }
    });
  </script>
</body>
</html>
